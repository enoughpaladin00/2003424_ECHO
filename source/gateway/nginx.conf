worker_processes auto;

events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=ui_limit:10m rate=20r/s;

    upstream backend_api {
        server backend-api:3000 max_fails=3 fail_timeout=30s;
    }

    upstream frontend_dashboard {
        server dashboard:3000 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name localhost;

        resolver 127.0.0.11 valid=10s;

        # REST API — strip /api prefix before forwarding to backend
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # WebSocket — real-time push to dashboard
        location ~* ^/ws {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Frontend — catch-all
        location / {
            limit_req zone=ui_limit burst=50 nodelay;
            proxy_pass http://frontend_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
