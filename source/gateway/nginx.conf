worker_processes auto;  #Automatically set the number of worker processes based on available CPU cores

events {
    worker_connections 1024;    #maximum number of simultaneous connections per worker
}

http {
    # ------------------------------------------------
    # 1. RATE LIMITING ZONES
    # ------------------------------------------------
    # Zone for API endpoints: allows 10 requests per second per IP    
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Zone for standard UI traffic: allows 20 requests per second per IP
    limit_req_zone $binary_remote_addr zone=ui_limit:10m rate=20r/s;

    # --------------------------------------------------------
    # 2. UPSTREAMS & LOAD BALANCING (Circuit Breaking)
    # --------------------------------------------------------
    upstream backend_api {  
        server backend-api:3000 max_fails=3 fail_timeout=30s;
    }
    upstream frontend_dashboard {
        server dashboard:3000 max_fails=3 fail_timeout=30s;
    }
    upstream processing_engine {
        server processing-replica:8080 max_fails=3 fail_timeout=30s;
    }

    # -------------------------------
    # 3. SERVER ROUTING RULES
    # --------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        resolver 127.0.0.11 valid=10s;  #Use Docker's internal DNS resolver for service discovery

        # -> Route A: REST API Traffic
        location /api {
            limit_req zone=api_limit burst=20 nodelay; # Apply rate limiting
            
            # Forward API requests to the backend service, ensuring that client IP and host information are preserved for accurate logging and processing
            proxy_pass http://backend_api;

            # Essential headers for accurate client IP forwarding and host information
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # -> Route B: Real-Time WebSocket/SSE Traffic
        location /ws {
            proxy_pass http://backend_api;
            
            proxy_http_version 1.1; # Use HTTP/1.1 for WebSocket support
            
            # WebSocket-specific headers to ensure proper connection upgrade and maintenance
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            
            proxy_set_header Host $host;
            
            # Prevent Nginx from closing the connection during silent periods
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # -> Route C: Direct Processing Engine API (If applicable)
        location /engine/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://processing_engine;
            proxy_set_header Host $host;
        }

        # -> Route D: Frontend Dashboard (Catch-All)
        location / {
            limit_req zone=ui_limit burst=50 nodelay;
            proxy_pass http://frontend_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}