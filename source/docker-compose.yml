services:
# ==========================================
# 1. API Gateway
# ==========================================
  api-gateway:
    image: nginx:alpine
    container_name: echo-api-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend-api:
        condition: service_healthy
      dashboard:
        condition: service_started
    networks:
      - echo-network
    restart: always

# ==========================================
# 2. Message Broker
# ==========================================
  ingestion-broker:
    build:
      context: ./broker
      dockerfile: Dockerfile
    container_name: echo-ingestion-broker
    ports:
      - "8000:8000"
    depends_on:
      - seismic-simulator
    networks:
      - echo-network
    restart: on-failure

# ==========================================
# 3. Processing Engine
# ==========================================
  processing-replica:
    build:
      context: ./processing-engine
      dockerfile: Dockerfile
    deploy:
      replicas: 3
    environment:
      - PYTHONUNBUFFERED=1                              # ← FIX: log visibili in docker logs
      - BROKER_WS_URL=ws://ingestion-broker:8000        # ← FIX: URL esplicito
      - SIMULATOR_URL=http://seismic-simulator:8080     # ← FIX: URL esplicito
      - DB_SERVICE_URL=http://backend-api:3000          # ← FIX: URL esplicito
      # REPLICA_ID rimosso → usa socket.gethostname() automaticamente (univoco per container)
    depends_on:
      ingestion-broker:
        condition: service_started
      database:
        condition: service_healthy
    networks:
      - echo-network
    restart: on-failure

# ==========================================
# 4. Persistence Layer - Database
# ==========================================
  database:
      image: postgres:15-alpine
      container_name: echo-database
      environment:
        POSTGRES_USER: echo_admin
        POSTGRES_PASSWORD: echodbpassword
        POSTGRES_DB: echo_classified_events
      ports:
        - "5432:5432"
      volumes:
        - echo-db-data:/var/lib/postgresql/data
      networks:
        - echo-network
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U echo_admin -d echo_classified_events"]
        interval: 10s
        timeout: 5s
        retries: 5
  
  
  backend-api:
      build:
        context: ./backend
        dockerfile: Dockerfile
      container_name: echo-backend-api
      environment:
        - DB_HOST=database
        - DB_USER=echo_admin
        - DB_PASS=echodbpassword
        - DB_NAME=echo_classified_events
      depends_on:
        database:
          condition: service_healthy
      networks:
        - echo-network
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
        interval: 15s
        timeout: 5s
        retries: 3
  # ===========================================
  # 5. Command Dashboard
  # ==========================================
  dashboard:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      container_name: echo-dashboard
      environment:
        - REACT_APP_API_URL=http://localhost/api
        - REACT_APP_WS_URL=ws://localhost/ws
      networks:
        - echo-network
      depends_on:
        - backend-api
  # ==========================================
  # External System Actor
  # ==========================================
  seismic-simulator:
      image: seismic-signal-simulator:multiarch_v1
      container_name: echo-seismic-simulator
      ports:
        - "8080:8080"
      networks:
        - echo-network
  
  # ==========================================
  # Global Networks & Volumes
  # ==========================================
networks:
  echo-network:
    driver: bridge

volumes:
  echo-db-data:
    driver: local

