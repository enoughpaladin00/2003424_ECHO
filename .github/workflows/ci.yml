name: E.C.H.O. Infrastructure CI

on:
  push:
    branches:
      - chore/jr-gateway-pipeline
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Validate and Build Docker Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose Configuration
        run: |
          echo "Validating docker-compose.yml syntax..."
          cd source && docker compose config -q

      - name: Build Custom Microservices
        run: |
          echo "Building Frontend, Backend, and Processing Engine containers..."
          cd source && docker compose build dashboard backend-api processing-replica ingestion-broker

      - name: Verify Nginx Configuration Syntax
        run: |
          echo "Testing Nginx configuration for syntax errors..."
          # We use --add-host to trick Nginx into passing the DNS resolution check for our microservices
          docker run --rm \
            --add-host echo-backend-api:127.0.0.1 \
            --add-host echo-dashboard:127.0.0.1 \
            --add-host processing-replica:127.0.0.1 \
            -v ${{ github.workspace }}/gateway/nginx.conf:/etc/nginx/nginx.conf:ro \
            nginx:alpine nginx -t